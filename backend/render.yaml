services:
  - type: web
    name: career-shift-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: career-shift-db
          property: connectionString
      - key: CORS_ALLOW_ORIGINS
        value: https://jobhunt-assistant.vercel.app,https://*.vercel.app,http://localhost:5173,http://localhost:5174,http://localhost:5175
      - key: PINME_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256

databases:
  - name: career-shift-db
    plan: free
